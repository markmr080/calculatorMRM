name: CI CalculatorMRM

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./calculatorMRM

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configuración de JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          check-latest: true
          cache: 'gradle'

      - name: Asegurar que gradlew sea ejecutable

        run: chmod +x ./gradlew

      - name: Compilación
      
        run: ./gradlew compileJava --no-daemon