name: CI CalculatorMRM

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./calculatorMRM

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configuración de JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          check-latest: true
          cache: 'gradle'

      - name: Asegurar que gradlew sea ejecutable

        run: chmod +x ./gradlew

      - name: Compilación
      
        run: ./gradlew compileJava --no-daemon
      
      - name: Pruebas unitarias
        run: ./gradlew test --no-daemon
      
      - name: Cobertura de codigo
        run: ./gradlew jacocoTestReport --no-daemon

      - name: Se sube el informe jacocoTestReport
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: build/reports/jacoco/test/html

      - name: Fuerza comprobación de cobertura de codigo
        run: ./gradlew jacocoTestCoverageVerification --no-daemon